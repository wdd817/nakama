services:
  cockroachdb:
    image: cockroachdb/cockroach:latest-v24.1
    command: start-single-node --insecure --store=attrs=ssd,path=/var/lib/cockroach/
    restart: "no"
    volumes:
      - data:/var/lib/cockroach
    expose:
      - "8080"
      - "26257"
    ports:
      - "26257:26257"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 3s
      timeout: 3s
      retries: 5

  nakama1:
    build: .
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
          /nakama/nakama migrate up --database.address root@cockroachdb:26257 &&
          exec /nakama/nakama
          --name nakama1
          --database.address root@cockroachdb:26257
          --logger.level DEBUG
          --session.token_expiry_sec 7200
          --metrics.prometheus_port 9100
          --cluster.enabled=true
          --cluster.gossip_port=7352
    restart: "no"
    depends_on:
      cockroachdb:
        condition: service_healthy
    volumes:
      - ./:/nakama/data
    expose:
      - "7349"
      - "7350"
      - "7351"
      - "7352"
      - "9100"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  nakama2:
    build: .
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
          exec /nakama/nakama
          --name nakama2
          --database.address root@cockroachdb:26257
          --logger.level DEBUG
          --session.token_expiry_sec 7200
          --metrics.prometheus_port 9100
          --cluster.enabled=true
          --cluster.gossip_port=7352
          --cluster.join_addrs=nakama1:7352
    restart: "no"
    depends_on:
      nakama1:
        condition: service_healthy
    volumes:
      - ./:/nakama/data
    expose:
      - "7349"
      - "7350"
      - "7351"
      - "7352"
      - "9100"
    ports:
      - "7359:7349"
      - "7360:7350"
      - "7361:7351"

  nakama3:
    build: .
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
          exec /nakama/nakama
          --name nakama3
          --database.address root@cockroachdb:26257
          --logger.level DEBUG
          --session.token_expiry_sec 7200
          --metrics.prometheus_port 9100
          --cluster.enabled=true
          --cluster.gossip_port=7352
          --cluster.join_addrs=nakama1:7352
    restart: "no"
    depends_on:
      nakama1:
        condition: service_healthy
    volumes:
      - ./:/nakama/data
    expose:
      - "7349"
      - "7350"
      - "7351"
      - "7352"
      - "9100"
    ports:
      - "7369:7349"
      - "7370:7350"
      - "7371:7351"

volumes:
  data:
